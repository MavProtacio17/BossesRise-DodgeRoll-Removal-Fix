[[mods]]
modId="bossesrise_dodgeroll_removal"
version="1.0.0"
displayName="BossesRise DodgeRoll Removal Fix"
displayURL="https://github.com/MavProtacio17/BossesRise-DodgeRoll-Removal-Fix"
description='''Fully removes the dodge/roll mechanic from Bosses'Rise for players and modpackers who don't want it.

Via mixins (no Bosses'Rise files are edited or redistributed):
 - removes the "Dodge Roll" key binding entirely (never registered, so it is absent from the Controls menu)
 - removes the roll ability - it can never trigger (no i-frames, no movement)
 - removes the roll-count HUD (never rendered)
 - removes the "roll_count" attribute from all gear, so its tooltip line and the now-empty "When in <slot>:" header both disappear

The result is a clean, roll-free Bosses'Rise. Requires Bosses'Rise to be installed.'''
authors="DreamPack"

